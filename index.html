  :root{
    --ink:#1f2a24;
    --paper:#f6f4ee;
    --card:#ffffff;
    --line:#dcd6c8;
    --accent:#3f6b4d;
    --accent2:#c8622a;
    --carb:#c8622a;
    --protein:#3f6b4d;
    --fat:#8a6b3f;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    font-family:'Noto Sans TC',sans-serif;
    background:var(--paper);
    color:var(--ink);
  }
  header{
    padding:36px 20px 20px;
    text-align:center;
    border-bottom:2px solid var(--ink);
  }
  header h1{
    font-family:'Noto Serif TC',serif;
    font-weight:900;
    font-size:clamp(28px,5vw,42px);
    margin:0 0 6px;
    letter-spacing:.04em;
  }
  header p{
    margin:0;
    color:#5a5a52;
    font-size:14px;
  }
  .controls{
    max-width:960px;
    margin:20px auto 0;
    padding:0 16px;
    display:flex;
    flex-wrap:wrap;
    gap:10px;
    align-items:center;
  }
  #search{
    flex:1;
    min-width:220px;
    padding:12px 16px;
    font-size:16px;
    border:2px solid var(--ink);
    border-radius:2px;
    background:var(--card);
    font-family:'Noto Sans TC',sans-serif;
  }
  #search:focus{outline:2px solid var(--accent2);outline-offset:1px;}
  .chip-row{
    max-width:960px;
    margin:14px auto 0;
    padding:0 16px;
    display:flex;
    flex-wrap:wrap;
    gap:8px;
  }
  .chip{
    padding:6px 14px;
    border:1px solid var(--ink);
    border-radius:999px;
    font-size:13px;
    cursor:pointer;
    background:var(--card);
    user-select:none;
  }
  .chip.active{
    background:var(--ink);
    color:var(--paper);
  }
  #count{
    max-width:960px;
    margin:16px auto 0;
    padding:0 16px;
    font-size:13px;
    color:#5a5a52;
  }
  main{
    max-width:960px;
    margin:0 auto;
    padding:12px 16px 60px;
  }
  .store-group{
    margin-top:28px;
  }
  .store-title{
    font-family:'Noto Serif TC',serif;
    font-weight:700;
    font-size:20px;
    border-bottom:2px solid var(--ink);
    padding-bottom:6px;
    margin-bottom:10px;
    display:flex;
    align-items:baseline;
    gap:8px;
  }
  .store-title .n{
    font-size:12px;
    color:#8a8a80;
    font-weight:400;
  }
  .card{
    background:var(--card);
    border:1px solid var(--line);
    border-left:4px solid var(--accent);
    border-radius:3px;
    padding:14px 16px;
    margin-bottom:10px;
  }
  .card .kcal{
    display:inline-block;
    font-family:'Noto Serif TC',serif;
    font-weight:900;
    font-size:13px;
    color:#fff;
    background:var(--ink);
    padding:2px 9px;
    border-radius:2px;
    margin-bottom:6px;
  }
  .card .dish{
    font-size:15px;
    font-weight:500;
    line-height:1.5;
    margin-bottom:8px;
  }
  .macros{
    display:flex;
    gap:14px;
    font-size:13px;
    font-family:'Noto Sans TC',sans-serif;
  }
  .macros span{display:flex;align-items:center;gap:4px;}
  .dot{width:8px;height:8px;border-radius:50%;display:inline-block;}
  .dot.c{background:var(--carb);}
  .dot.p{background:var(--protein);}
  .dot.f{background:var(--fat);}
  .empty{
    text-align:center;
    padding:60px 20px;
    color:#8a8a80;
    font-size:15px;
  }
</style>
</head>

const stores = [...new Set(DATA.map(d=>d.store))];

const chipsEl = document.getElementById('chips');
let activeStore = null;
stores.forEach(s=>{
  const c = document.createElement('div');
  c.className='chip';
  c.textContent=s;
  c.onclick=()=>{
    activeStore = activeStore===s ? null : s;
    document.getElementById('search').value='';
    render();
    [...chipsEl.children].forEach(ch=>ch.classList.toggle('active', ch.textContent===activeStore));
  };
  chipsEl.appendChild(c);
});

function fmt(v){ return v===null||v===undefined ? '—' : v; }

function render(){
  const q = document.getElementById('search').value.trim().toLowerCase();
  const main = document.getElementById('main');
  main.innerHTML='';
  let list = DATA;
  if(activeStore) list = list.filter(d=>d.store===activeStore);
  if(q) list = list.filter(d=> d.store.toLowerCase().includes(q) || d.dish.toLowerCase().includes(q));

  document.getElementById('count').textContent = `共 ${list.length} 筆結果`;

  if(list.length===0){
    main.innerHTML = '<div class="empty">找不到符合的店家或餐點，試試其他關鍵字</div>';
    return;
  }

  const byStore = {};
  list.forEach(d=>{ (byStore[d.store] = byStore[d.store]||[]).push(d); });

  Object.keys(byStore).forEach(store=>{
    const group = document.createElement('div');
    group.className='store-group';
    const items = byStore[store].sort((a,b)=>a.kcal-b.kcal);
    group.innerHTML = `<div class="store-title">${store}<span class="n">${items.length} 項</span></div>`;
    items.forEach(d=>{
      const card = document.createElement('div');
      card.className='card';
      card.innerHTML = `
        <div class="kcal">${d.kcal} 大卡</div>
        <div class="dish">${d.dish}</div>
        <div class="macros">
          <span><span class="dot c"></span>醣 ${fmt(d.c)}g</span>
          <span><span class="dot p"></span>蛋白 ${fmt(d.p)}g</span>
          <span><span class="dot f"></span>脂 ${fmt(d.f)}g</span>
        </div>`;
      group.appendChild(card);
    });
    main.appendChild(group);
  });
}

document.getElementById('search').addEventListener('input', render);
render();
</script>
